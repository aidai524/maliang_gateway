# Nginx Configuration for Maliang API Gateway
# Place this file at /etc/nginx/sites-available/maliang_gateway
# Then symlink to /etc/nginx/sites-enabled/

# Upstream PHP-FPM
upstream php-fpm {
    server unix:/run/php/php8.2-fpm.sock;
    # Or use TCP: server 127.0.0.1:9000;
}

# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name your-gateway-domain.com;

    # Redirect all HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-gateway-domain.com;

    # SSL Configuration (update paths)
    ssl_certificate /etc/ssl/certs/your-domain.crt;
    ssl_certificate_key /etc/ssl/private/your-domain.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Root directory
    root /var/www/maliang_gateway/public;
    index index.php;

    # Logging
    access_log /var/log/nginx/maliang_gateway_access.log;
    error_log /var/log/nginx/maliang_gateway_error.log;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Increase file upload limits
    client_max_body_size 50M;
    client_body_buffer_size 1M;

    # Timeouts for long-running requests (image generation can take time)
    proxy_connect_timeout 120s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;
    fastcgi_connect_timeout 120s;
    fastcgi_send_timeout 120s;
    fastcgi_read_timeout 120s;

    # Main Laravel handling
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Health check endpoint (no auth required)
    location = /health {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # API endpoints under /v1/
    location /v1 {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Block admin endpoints at Nginx level (additional security)
    location ~ ^/v1/admin {
        return 404 '{"error":"NOT_FOUND","message":"This endpoint is not available through the gateway"}';
        add_header Content-Type application/json always;
    }

    # Static files
    location ~* \.(jpg|jpeg|gif|png|css|js|ico|xml|svg|woff|woff2|ttf|eot)$ {
        try_files $uri $uri/ /index.php?$query_string;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # PHP-FPM handling
    location ~ \.php$ {
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        
        # Buffer settings for large responses
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }

    # Deny access to sensitive files
    location ~* \.(env|log|git|gitignore|dockerignore|md)$ {
        deny all;
    }
}

# Rate limiting zone (add to http block in nginx.conf)
# limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
# limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=2r/s;
